spring.application.name=student-service
server.port=${SERVER_PORT:8082}
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/studentdb}
app.jwt.secret=${JWT_SECRET:StudentEventRegistrationSecretKeyForJwtSigning2026}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.services.event.base-url=${EVENT_SERVICE_URL:http://localhost:8081}
app.admin.name=${ADMIN_NAME:Faculty (Admin)}
app.admin.roll-no=${ADMIN_ROLL_NO:9999}
app.admin.email=${ADMIN_EMAIL:admin@campus.local}
app.admin.password=${ADMIN_PASSWORD:Admin@123}